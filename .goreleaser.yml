version: 2

builds:
  - main: .
    binary: devc
    ldflags:
      - -X main.version={{ .Version }} -s -w
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: KUCHITAKE
    name: devc
