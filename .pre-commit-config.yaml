repos:
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.10.1
    hooks:
      - id: golangci-lint-full

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: bash -c 'out=$(gofmt -l "$@"); if [ -n "$out" ]; then echo "gofmt found unformatted files:"; echo "$out"; exit 1; fi' --
        language: system
        types: [go]

      - id: go-test
        name: go test
        entry: go test ./...
        language: system
        pass_filenames: false
        types: [go]
